<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment</title>
    <style>
        /* Base styles */
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        /* Question container styling */
        .question-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            display: none; /* Hide all questions initially */
        }

        .question-container.active {
            display: block; /* Show the active question */
        }

        .question-container p {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 15px;
        }

        /* Checkbox styling */
        input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }

        label {
            font-size: 1em;
            color: #333;
        }

        /* Button styling */
        button {
            background-color: black;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 10px;
        }

        button:hover {
            background-color: #333;
        }

        /* Responsive design */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .question-container {
                padding: 15px;
            }

            .question-container p {
                font-size: 1em;
            }

            button {
                width: 100%;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <h1>Assessment for {{ username }}</h1>

    <form id="assessment-form" method="POST" action="{{ url_for('assessment_result') }}">
        {% for question in questions %}
        <div class="question-container" id="question-{{ loop.index }}">
            <p><strong>{{ question["question"] }}</strong></p>
            {% for option in question["options"] %}
            <label>
                <input type="checkbox" name="answers[]" value="{{ option }}" > {{ option }}
            </label><br>
            {% endfor %}
        </div>
        {% endfor %}

        <!-- Navigation buttons -->
        <button type="button" id="prev-btn" onclick="prevQuestion()" style="display: none;">Previous</button>
        <button type="button" id="next-btn" onclick="nextQuestion()">Next</button>
        <button type="submit" id="submit-btn" style="display: none;">Submit Assessment</button>
    </form>

    <script>
        let currentQuestion = 1;
        const totalQuestions = {{ questions|length }};

        // Function to show the current question and hide others
        function showQuestion(index) {
            // Hide all questions
            document.querySelectorAll('.question-container').forEach((question) => {
                question.classList.remove('active');
            });

            // Show the current question
            document.getElementById(`question-${index}`).classList.add('active');

            // Show/hide Previous and Next buttons
            document.getElementById('prev-btn').style.display = index === 1 ? 'none' : 'inline-block';
            document.getElementById('next-btn').style.display = index === totalQuestions ? 'none' : 'inline-block';
            document.getElementById('submit-btn').style.display = index === totalQuestions ? 'inline-block' : 'none';
        }

        // Function to go to the next question
        function nextQuestion() {
            if (currentQuestion < totalQuestions) {
                currentQuestion++;
                showQuestion(currentQuestion);
            }
        }

        // Function to go to the previous question
        function prevQuestion() {
            if (currentQuestion > 1) {
                currentQuestion--;
                showQuestion(currentQuestion);
            }
        }

        // Show the first question on page load
        showQuestion(currentQuestion);
    </script>
</body>
</html>
