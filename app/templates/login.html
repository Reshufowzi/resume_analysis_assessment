<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4); /* Soft pink gradient */
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Container */
        .login-container {
            background: rgba(255, 255, 255, 0.9); /* Semi-transparent white */
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* Stylish Login Title */
        h1 {
            font-size: 32px;
            margin-bottom: 25px;
            color: #ff6f61; /* Coral red */
            font-weight: bold;
            position: relative;
            display: inline-block;
        }

        h1::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 3px;
            background: #ff6f61; /* Coral red underline */
            bottom: -10px;
            left: 0;
            border-radius: 2px;
            animation: underlineAnimation 2s infinite ease-in-out;
        }

        @keyframes underlineAnimation {
            0% { transform: scaleX(0); }
            50% { transform: scaleX(1); }
            100% { transform: scaleX(0); }
        }

        /* Input Groups */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .input-group input, .input-group select {
            width: calc(100% - 30px);
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            background: transparent;
            color: #333;
        }

        .input-group i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6f61; /* Coral red accent */
        }

        /* Login Button */
        .login-btn {
            background: #ff6f61; /* Coral red */
            color: #fff;
            border: none;
            padding: 14px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(255, 111, 97, 0.3);
        }

        .login-btn:hover {
            background: #ff3b2f; /* Darker coral red on hover */
        }

        /* Background Animation */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb); /* Multi-color gradient */
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Stylish Login Title -->
        <h1>Login</h1>
        <form method="POST">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" name="username" placeholder="Enter your name" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-user-tag"></i>
                <select id="user_type" name="user_type" required>
                    <option value="" disabled selected>Select User Type</option>
                    <option value="student">Student</option>
                    <option value="experienced">Experienced</option> 
                </select>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>
</body>
</html>
